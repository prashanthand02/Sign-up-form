<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign-up-form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="image">
        <img src="image.jpg" alt="a backround image of topical leaves">
        <div id="inside-img">
            <div>
                <img src="odin-lined.png" alt="Odin project logo">
                <p>ODIN</p>
            </div>
            <p>Photo by Halie West on Unsplash</p>
        </div>
    </div>
    <div id="text-container">
        <div id="text">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. <br> Sign up now to get started.</p>
            <p>You know you want to.</p>
        </div>
            <form>
                <fieldset>
                    <legend>Let's do this!</legend>
                    <div>
                        <label for="first-name">FIRST NAME</label>
                        <input type="text" id="first-name" name="first-name">
                    </div>
                    <div>
                        <label for="last-name">LAST NAME</label>
                        <input type="text" id="last-name" name="last-name">
                    </div>
                    <div>
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email">
                    </div>
                    <div>
                        <label for="phn-num">PHONE NUMBER</label>
                        <input type="number" id="phn-num" name="phn-num">
                    </div>
                    <div>
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password">
                    </div>
                    <div>
                        <label for="confirm-pass">CONFIRM PASSWORD</label>
                        <input type="password" name="confirm-pass" id="confirm-pass">
                    </div>
                </fieldset>
            </form>
        <button type="submit">Create Account</button>
        <p>Already have an account? <a>Log in</a></p>
    </div>
</body>
</html>
